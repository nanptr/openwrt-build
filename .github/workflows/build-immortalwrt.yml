name: Build ImmortalWrt NanoPi R6C

on:
  push:
    branches:
      - main
    paths:
      - immortalwrt-version.txt
      - configs/iwrt-nanopi-r6c.config
      - files/**
      - .github/workflows/build-immortalwrt.yml
      - README.md
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-immortalwrt-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: configs/iwrt-nanopi-r6c.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Load ImmortalWrt version
      run: |
        echo "IWRT_VERSION=$(tr -d '\n' < immortalwrt-version.txt)" >> "$GITHUB_ENV"

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
          gettext gcc-multilib g++-multilib gnutls-dev gperf haveged help2man intltool \
          lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev \
          libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp ninja-build p7zip \
          p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils \
          rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip wget xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown "$USER:$USER" /workdir

    - name: Clone ImmortalWrt source
      working-directory: /workdir
      run: |
        git clone --filter=blob:none --single-branch -b "$REPO_BRANCH" "$REPO_URL" openwrt
        cd openwrt
        if git ls-remote --exit-code --tags origin "v${IWRT_VERSION}" >/dev/null 2>&1; then
          git fetch --depth=1 origin "refs/tags/v${IWRT_VERSION}:refs/tags/v${IWRT_VERSION}"
          git checkout -q "v${IWRT_VERSION}"
        else
          echo "Tag v${IWRT_VERSION} not found, using branch ${REPO_BRANCH}."
        fi
        ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom files and config
      run: |
        if [ -d files ]; then
          mkdir -p openwrt/files
          cp -a files/. openwrt/files/
        fi
        cp "$CONFIG_FILE" openwrt/.config
        cd openwrt
        make defconfig
        grep -E 'CONFIG_TARGET_|CONFIG_PACKAGE_(dockerd|docker|docker-compose|nginx-ssl|luci-ssl-nginx)|CONFIG_KERNEL_CGROUP_DEVICE|CONFIG_DOCKER_CGROUP_OPTIONS' .config

    - name: Download packages
      run: |
        cd openwrt
        make download -j"$(nproc)"
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      id: build
      run: |
        cd openwrt
        make -j"$(nproc)" || make -j1 V=s
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"
        manifest="$(find bin/targets -name '*.manifest' | head -n 1)"
        if [ -n "$manifest" ]; then
          kernelv="$(grep '^kernel - ' "$manifest" | awk '{print $3}' | head -n 1)"
          [ -n "$kernelv" ] && echo "kernel_version=$kernelv" >> "$GITHUB_OUTPUT"
        fi

    - name: Organize firmware
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}/*

    - name: Generate release notes
      run: |
        {
          echo "ImmortalWrt NanoPi R6C"
          echo
          echo "Version: ${IWRT_VERSION}"
          echo "Default address: 192.168.10.1"
          if [ -n "${{ steps.build.outputs.kernel_version }}" ]; then
            echo "Kernel: ${{ steps.build.outputs.kernel_version }}"
          fi
          echo
          echo "Build mode: full source build"
          echo "Docker cgroup options: enabled"
          echo "Nginx: included"
        } > release.txt

    - name: Upload release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: immortalwrt-nanopi-r6c
        name: immortalwrt-nanopi-r6c-${{ env.IWRT_VERSION }}${{ env.FILE_DATE }}
        body_path: release.txt
        append_body: true
        files: ${{ env.FIRMWARE }}/*
