name: Build ImmortalWrt NanoPi R6C ImageBuilder

on:
  push:
    branches:
      - imagebuilder
    paths:
      - immortalwrt-version.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: imagebuilder-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IWRT_TARGET: rockchip
  IWRT_SUBTARGET: armv8
  PROFILE: friendlyarm_nanopi-r6c
  ROOTFS_PARTSIZE: 1024
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Prepare environment
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo apt-get -qq update
        sudo apt-get -qq install zstd

    - name: Load ImmortalWrt version
      run: |
        echo "IWRT_VERSION=$(tr -d '\n' < immortalwrt-version.txt)" >> "$GITHUB_ENV"

    - name: Download ImageBuilder
      run: |
        WORKDIR="${RUNNER_TEMP}/imagebuilder"
        mkdir -p "${WORKDIR}"
        cd "${WORKDIR}"
        IMAGEBUILDER="immortalwrt-imagebuilder-${IWRT_VERSION}-${IWRT_TARGET}-${IWRT_SUBTARGET}.Linux-x86_64.tar.zst"
        BASE_URL="https://downloads.immortalwrt.org/releases/${IWRT_VERSION}/targets/${IWRT_TARGET}/${IWRT_SUBTARGET}"
        wget -nv "${BASE_URL}/${IMAGEBUILDER}"
        tar --zstd -xf "${IMAGEBUILDER}"
        echo "IMAGEBUILDER_DIR=${WORKDIR}/${IMAGEBUILDER%.Linux-x86_64.tar.zst}.Linux-x86_64" >> "$GITHUB_ENV"

    - name: Prepare package list
      run: |
        packages="$(sed '/^#/d;/^$/d' imagebuilder-packages.txt | xargs)"
        echo "PACKAGES=${packages}" >> "$GITHUB_ENV"

    - name: Build firmware
      run: |
        cd "$IMAGEBUILDER_DIR"
        if grep -q '^CONFIG_TARGET_ROOTFS_PARTSIZE=' .config; then
          sed -i "s/^CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=${ROOTFS_PARTSIZE}/" .config
        else
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=${ROOTFS_PARTSIZE}" >> .config
        fi
        make info
        make image \
          PROFILE="${PROFILE}" \
          PACKAGES="${PACKAGES}" \
          FILES="${GITHUB_WORKSPACE}/files" \
          ROOTFS_PARTSIZE="${ROOTFS_PARTSIZE}" \
          EXTRA_IMAGE_NAME="packages"
        echo "FIRMWARE_DIR=${IMAGEBUILDER_DIR}/bin/targets/${IWRT_TARGET}/${IWRT_SUBTARGET}" >> "$GITHUB_ENV"
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

    - name: Check output
      run: |
        ls -lh "$FIRMWARE_DIR"

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_ImageBuilder_${{ env.PROFILE }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_DIR }}/*

    - name: Generate release notes
      run: |
        {
          echo "ImmortalWrt ImageBuilder"
          echo
          echo "Version: ${IWRT_VERSION}"
          echo "Target: ${IWRT_TARGET}/${IWRT_SUBTARGET}"
          echo "Profile: ${PROFILE}"
          echo "Rootfs Partsize: ${ROOTFS_PARTSIZE} MB"
          echo "Default address: 192.168.10.1"
          echo
          echo "Packages:"
          sed 's/^/- /' imagebuilder-packages.txt
        } > release.txt

    - name: Upload release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: imagebuilder-nanopi-r6c
        name: imagebuilder-nanopi-r6c-${{ env.IWRT_VERSION }}${{ env.FILE_DATE }}
        body_path: release.txt
        append_body: true
        generate_release_notes: true
        files: ${{ env.FIRMWARE_DIR }}/*
